<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sinwan — Benchmark</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 1.5rem;
        background: #111;
        color: #eee;
      }
      h1 { margin: 0 0 0.5rem; }
      button {
        padding: 0.6rem 1rem;
        font-size: 1rem;
        cursor: pointer;
        background: #2563eb;
        color: white;
        border: 0;
        border-radius: 6px;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      #stage {
        max-height: 220px;
        overflow: hidden;
        margin-top: 1rem;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 4px;
      }
      .bench-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .bench-table td { padding: 2px 6px; border-bottom: 1px solid #222; }
      .bench-report { margin-top: 1rem; border-collapse: collapse; }
      .bench-report th, .bench-report td {
        padding: 6px 12px;
        border: 1px solid #333;
      }
      .bench-report .num { text-align: right; font-variant-numeric: tabular-nums; }
      #report { margin-top: 1rem; }
    </style>
  </head>
  <body>
    <h1>Sinwan Benchmark</h1>
    <p>
      Results are printed to this page and to the console as
      <code>BENCH …</code>. Run with a single active tab, throttling disabled,
      and devtools closed for stable numbers.
    </p>
    <button id="run">Run benchmark</button>
    <div id="stage"></div>
    <div id="report"></div>
    <script type="module" src="/src/benchmarks/mount-bench.tsx"></script>
  </body>
</html>
